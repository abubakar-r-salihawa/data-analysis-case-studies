name: Import portfolio package

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  import-portfolio:
    if: contains(github.event.pull_request.title, 'READY')
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull-request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Rebuild and extract portfolio package
        run: |
          cat .portfolio-parts/part-*.txt > portfolio.b64
          base64 --decode portfolio.b64 > portfolio.zip
          unzip -o portfolio.zip
          rm -rf .portfolio-parts .portfolio-import-trigger portfolio.b64 portfolio.zip

      - name: Commit published case studies
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish completed data analysis case studies"
          git push origin HEAD:${{ github.head_ref }}
